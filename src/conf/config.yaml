# conf/config.yaml
paths:
  target_train: [ "data/target_train", "data/target_dev" ]
  non_target_train: [ "data/non_target_train", "data/non_target_dev" ]
  eval_dir: "eval_data"
  models_dir: "saved_models"

features:
  image:
    type: "hog_lbp" # Options: 'raw', 'hog', 'lbp', 'hog_lbp'
    hog:
      orientations: 8
      pixels_per_cell: [ 8, 8 ]
      cells_per_block: [ 2, 2 ]
    lbp:
      radius: 1
      n_points: 8 # Usually 8 * radius
      method: "uniform"

training:
  cv_splits: 3
  augment: False

models:
  audio:
    _target_: models.gmm.GMMDetector
    n_components: 30
    n_iter: 40
    verbose: true

  image:
    _target_: models.mlp.MLPDetector
    hidden_size: 50
    epochs: 100
    learning_rate: 0.01
    verbose: False

  # image:
  #   _target_: models.lda.LDADetector
  #   use_pca: True
  #   pca_variance: 0.95
  #   verbose: True

  fusion:
    _target_: models.fusion.ScoreFusionDetector
    epochs: 200
    learning_rate: 0.05
    verbose: False
